<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数独挑战 - 1000关</title>
<style>
:root {
  --primary: #5B86E5;
  --primary-dark: #4a6fbf;
  --primary-light: #e8f0fe;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --given: #2c3e50;
  --user: #5B86E5;
  --error: #e74c3c;
  --success: #27ae60;
  --selected: #d5e8f8;
  --same-num: #eef2ff;
  --note-color: #7f8c8d;
  --border: #bdc3c7;
  --border-thick: #2c3e50;
  --shadow: 0 8px 32px rgba(0,0,0,0.1);
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}

.container {
  max-width: 520px;
  width: 100%;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px 20px 20px;
  margin: 0 auto;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), #8B5CF6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-light);
}
.stats span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Level bar */
.level-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.level-bar button {
  background: var(--primary);
  color: white;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.level-bar button:hover { background: var(--primary-dark); transform: scale(1.05); }
.level-bar button:active { transform: scale(0.95); }

.level-input-group {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}
.level-input-group label {
  font-size: 13px;
  color: var(--text-light);
  white-space: nowrap;
}
.level-input-group input {
  width: 70px;
  padding: 6px 8px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.level-input-group input:focus { border-color: var(--primary); }

.difficulty-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
  white-space: nowrap;
}
.diff-easy { background: #d4edda; color: #155724; }
.diff-medium { background: #fff3cd; color: #856404; }
.diff-hard { background: #f8d7da; color: #721c24; }
.diff-expert { background: #e8daef; color: #6c3483; }

/* Board */
.board-wrapper {
  position: relative;
  margin: 0 auto;
  max-width: 460px;
  width: 100%;
  aspect-ratio: 1;
}

.board {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  grid-template-rows: repeat(9, 1fr);
  width: 100%;
  height: 100%;
  border: 3px solid var(--border-thick);
  border-radius: 4px;
  background: var(--border);
  gap: 0;
}

.cell {
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(18px, 4.5vw, 34px);
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  user-select: none;
  aspect-ratio: 1;
  border: 0 solid #d0d0d0;
  border-right-width: 1px;
  border-bottom-width: 1px;
}
.cell.no-border-right { border-right-width: 0; }
.cell.no-border-bottom { border-bottom-width: 0; }
.cell:hover { background: #f0f4ff; }
.cell.given { font-weight: 700; color: var(--given); }
.cell.user { color: var(--user); font-weight: 600; }
.cell.selected { background: var(--selected) !important; }
.cell.same-num { background: var(--same-num); }
.cell.conflict { color: var(--error) !important; }
.cell.hint { animation: hintPulse 0.6s ease; }
.cell.completed { color: var(--success) !important; }

@keyframes hintPulse {
  0%, 100% { background: var(--selected); }
  50% { background: #fef9c3; transform: scale(1.08); }
}

/* Thick borders for 3x3 region boundaries */
.cell.thick-right { border-right-width: 3px; border-right-color: var(--border-thick); }
.cell.thick-bottom { border-bottom-width: 3px; border-bottom-color: var(--border-thick); }

/* Notes */
.cell .notes {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
}
.cell .notes span {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(7px, 1.5vw, 11px);
  color: var(--note-color);
  font-weight: 400;
}

/* Controls */
.controls {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.numpad {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 6px;
}
.numpad button {
  padding: 12px 0;
  font-size: 20px;
  font-weight: 600;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: white;
  color: var(--primary);
  cursor: pointer;
  transition: all 0.15s;
}
.numpad button:hover { background: var(--primary-light); border-color: var(--primary); }
.numpad button:active { transform: scale(0.95); }

.action-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.action-bar button {
  padding: 10px 0;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.action-bar button:active { transform: scale(0.95); }
.btn-undo { background: #f0f4f8; color: var(--text); }
.btn-undo:hover { background: #e2e8f0; }
.btn-erase { background: #fde8e8; color: var(--error); }
.btn-erase:hover { background: #f8d0d0; }
.btn-note { background: #f0f4f8; color: var(--text); }
.btn-note:hover { background: #e2e8f0; }
.btn-note.active { background: var(--primary); color: white; }
.btn-hint { background: #fef9c3; color: #856404; }
.btn-hint:hover { background: #fde68a; }
.btn-check { background: var(--success); color: white; }
.btn-check:hover { background: #219a52; }

/* Progress */
.progress-bar {
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: #e2e8f0;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 3px;
  transition: width 0.3s;
}
.progress-text {
  font-size: 12px;
  color: var(--text-light);
  white-space: nowrap;
}

/* Victory overlay */
.victory-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}
.victory-overlay.show { display: flex; }
.victory-card {
  background: white;
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  max-width: 360px;
  animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.victory-card h2 { font-size: 28px; margin-bottom: 8px; }
.victory-card p { color: var(--text-light); margin-bottom: 4px; font-size: 14px; }
.victory-card .stats-line { margin: 16px 0; display: flex; justify-content: center; gap: 24px; }
.victory-card .stats-line div { text-align: center; }
.victory-card .stats-line div .num { font-size: 24px; font-weight: 700; color: var(--primary); }
.victory-card .stats-line div .label { font-size: 11px; color: var(--text-light); }
.victory-card button {
  padding: 12px 32px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 6px;
  transition: all 0.2s;
}
.victory-card .btn-next { background: var(--primary); color: white; }
.victory-card .btn-next:hover { background: var(--primary-dark); }
.victory-card .btn-retry { background: #f0f4f8; color: var(--text); }
.victory-card .btn-retry:hover { background: #e2e8f0; }

/* Footer */
.footer {
  margin-top: 16px;
  text-align: center;
  font-size: 12px;
  color: var(--text-light);
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 999;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.error { background: var(--error); }
.toast.success { background: var(--success); }
.toast.info { background: var(--primary); }

/* Keyboard hints */
.key-hint { display: none; }

/* Floating number picker */
.num-picker {
  display: none;
  position: fixed;
  z-index: 500;
  background: white;
  border: 2px solid var(--primary);
  border-radius: 14px;
  padding: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}
.num-picker.show { display: grid; }
.num-picker button {
  width: 48px;
  height: 48px;
  font-size: 20px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  background: var(--primary-light);
  color: var(--primary);
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.num-picker button:hover { background: var(--primary); color: white; transform: scale(1.05); }
.num-picker button:active { transform: scale(0.9); }

/* Responsive */
@media (max-width: 480px) {
  body { padding: 10px; }
  .container { padding: 16px 12px; border-radius: 0; min-height: 100vh; }
  .header h1 { font-size: 18px; }
  .stats { font-size: 11px; gap: 10px; }
  .numpad button { padding: 10px 0; font-size: 17px; }
  .action-bar button { font-size: 11px; padding: 8px 0; }
  .cell { font-size: clamp(16px, 4vw, 28px); }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">
  <div class="header">
    <h1>数独挑战</h1>
    <div class="stats">
      <span>⏱ <b id="timerDisplay">00:00</b></span>
      <span>💡 <b id="hintCount">0</b></span>
    </div>
  </div>

  <div class="level-bar">
    <button id="prevLevelBtn" title="上一关">◀</button>
    <div class="level-input-group">
      <label>第</label>
      <input type="number" id="levelInput" min="1" max="1000" value="1">
      <label>关</label>
      <span class="difficulty-badge diff-easy" id="diffBadge">简单</span>
    </div>
    <button id="nextLevelBtn" title="下一关">▶</button>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
    <div class="num-picker" id="numPicker">
      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
    </div>
  </div>

  <div class="controls">
    <div class="numpad" id="numpad">
      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
    </div>
    <div class="action-bar">
      <button class="btn-undo" id="undoBtn">↩ 撤销</button>
      <button class="btn-erase" id="eraseBtn">✕ 擦除</button>
      <button class="btn-note" id="noteBtn">✎ 笔记</button>
      <button class="btn-hint" id="hintBtn">💡 提示</button>
      <button class="btn-check" id="checkBtn">✓ 检查</button>
    </div>
  </div>

  <div class="progress-bar">
    <span style="font-size:12px;color:var(--text-light)">进度</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-text" id="progressText">0/81</span>
  </div>

  <div class="footer">键盘 1-9 输入 · 方向键移动 · Del 擦除 · N 笔记模式</div>
</div>

<div class="victory-overlay" id="victoryOverlay">
  <div class="victory-card">
    <h2>🎉 通关成功！</h2>
    <p id="victoryLevel">第 1 关</p>
    <p id="victoryDifficulty" style="font-size:13px;margin-top:4px;"></p>
    <div class="stats-line">
      <div><div class="num" id="victoryTime">00:00</div><div class="label">用时</div></div>
      <div><div class="num" id="victoryHints">0</div><div class="label">提示次数</div></div>
      <div><div class="num" id="victoryErrors">0</div><div class="label">错误次数</div></div>
    </div>
    <div>
      <button class="btn-next" id="victoryNextBtn">下一关 →</button>
      <button class="btn-retry" id="victoryRetryBtn">重新挑战</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════
// 1. Seeded PRNG (mulberry32)
// ═══════════════════════════════════════════
function createRNG(seed) {
  let s = seed | 0;
  return function() {
    s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, s | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function shuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ═══════════════════════════════════════════
// 2. Base grid & transformations
// ═══════════════════════════════════════════
const BASE_GRID = [
  [1,2,3,4,5,6,7,8,9],
  [4,5,6,7,8,9,1,2,3],
  [7,8,9,1,2,3,4,5,6],
  [2,3,4,5,6,7,8,9,1],
  [5,6,7,8,9,1,2,3,4],
  [8,9,1,2,3,4,5,6,7],
  [3,4,5,6,7,8,9,1,2],
  [6,7,8,9,1,2,3,4,5],
  [9,1,2,3,4,5,6,7,8]
];

function copyGrid(g) {
  return g.map(r => [...r]);
}

function applyDigitPermutation(grid, rng) {
  const perm = [1,2,3,4,5,6,7,8,9];
  shuffle(perm, rng);
  return grid.map(row => row.map(d => perm[d - 1]));
}

function applyRowPermutation(grid, rng) {
  const result = copyGrid(grid);
  for (let band = 0; band < 3; band++) {
    const rows = [0, 1, 2];
    shuffle(rows, rng);
    const base = band * 3;
    const tmp = rows.map(i => result[base + i]);
    for (let i = 0; i < 3; i++) result[base + i] = tmp[i];
  }
  return result;
}

function applyColPermutation(grid, rng) {
  const result = copyGrid(grid);
  for (let stack = 0; stack < 3; stack++) {
    const cols = [0, 1, 2];
    shuffle(cols, rng);
    const base = stack * 3;
    for (let r = 0; r < 9; r++) {
      const tmp = cols.map(i => result[r][base + i]);
      for (let i = 0; i < 3; i++) result[r][base + i] = tmp[i];
    }
  }
  return result;
}

function applyBandPermutation(grid, rng) {
  const bands = [0, 1, 2];
  shuffle(bands, rng);
  const result = [];
  for (const b of bands) {
    for (let i = 0; i < 3; i++) result.push(grid[b * 3 + i]);
  }
  return result;
}

function applyStackPermutation(grid, rng) {
  const stacks = [0, 1, 2];
  shuffle(stacks, rng);
  return grid.map(row => {
    const result = [];
    for (const s of stacks) {
      for (let i = 0; i < 3; i++) result.push(row[s * 3 + i]);
    }
    return result;
  });
}

function generateCompleteGrid(seed) {
  let rng = createRNG(seed);
  let grid = copyGrid(BASE_GRID);
  grid = applyDigitPermutation(grid, rng);
  grid = applyRowPermutation(grid, rng);
  grid = applyColPermutation(grid, rng);
  grid = applyBandPermutation(grid, rng);
  grid = applyStackPermutation(grid, rng);
  // Extra: apply row & col permutation again with more iterations for variety
  rng = createRNG(seed + 9999);
  grid = applyRowPermutation(grid, rng);
  grid = applyColPermutation(grid, rng);
  return grid;
}

// ═══════════════════════════════════════════
// 3. Sudoku solver
// ═══════════════════════════════════════════
function getCandidates(grid, row, col) {
  if (grid[row][col] !== 0) return [];
  const used = new Set();
  for (let i = 0; i < 9; i++) {
    if (grid[row][i] !== 0) used.add(grid[row][i]);
    if (grid[i][col] !== 0) used.add(grid[i][col]);
  }
  const br = Math.floor(row / 3) * 3;
  const bc = Math.floor(col / 3) * 3;
  for (let r = br; r < br + 3; r++) {
    for (let c = bc; c < bc + 3; c++) {
      if (grid[r][c] !== 0) used.add(grid[r][c]);
    }
  }
  return [1,2,3,4,5,6,7,8,9].filter(n => !used.has(n));
}

function countSolutions(grid, limit) {
  let count = 0;
  function solve(g) {
    if (count >= limit) return;
    // Find cell with fewest candidates
    let minRow = -1, minCol = -1, minCands = null;
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        if (g[r][c] === 0) {
          const cands = getCandidates(g, r, c);
          if (cands.length === 0) return;
          if (minCands === null || cands.length < minCands.length) {
            minRow = r; minCol = c; minCands = cands;
            if (cands.length === 1) break; // optimal
          }
        }
      }
      if (minCands && minCands.length === 1) break;
    }
    if (minRow === -1) { count++; return; } // solved
    for (const n of minCands) {
      g[minRow][minCol] = n;
      solve(g);
      if (count >= limit) { g[minRow][minCol] = 0; return; }
      g[minRow][minCol] = 0;
    }
  }
  solve(grid.map(r => [...r]));
  return count;
}

function isUniqueSolution(grid) {
  return countSolutions(grid, 2) === 1;
}

// ═══════════════════════════════════════════
// 4. Puzzle generation
// ═══════════════════════════════════════════
function getCellsToRemove(level) {
  if (level <= 1) return 30;
  const t = (level - 1) / 999;
  // Smooth curve: easy start, progressively harder
  return 30 + Math.floor(Math.pow(t, 0.82) * 26);
}

function getDifficultyLabel(level) {
  if (level <= 200) return { label: '简单', class: 'diff-easy' };
  if (level <= 450) return { label: '中等', class: 'diff-medium' };
  if (level <= 700) return { label: '困难', class: 'diff-hard' };
  return { label: '专家', class: 'diff-expert' };
}

function generatePuzzle(level) {
  const solution = generateCompleteGrid(level * 137 + 42);
  const rng = createRNG(level * 7919 + 314159);
  const puzzle = copyGrid(solution);

  const target = getCellsToRemove(level);
  let positions = [];
  for (let i = 0; i < 81; i++) positions.push(i);
  shuffle(positions, rng);

  let removed = 0;
  const skipped = [];

  for (const pos of positions) {
    if (removed >= target) break;
    const row = Math.floor(pos / 9);
    const col = pos % 9;
    const saved = puzzle[row][col];
    puzzle[row][col] = 0;

    if (isUniqueSolution(puzzle)) {
      removed++;
    } else {
      puzzle[row][col] = saved;
      skipped.push(pos);
    }
  }

  // If we couldn't remove enough, try skipped positions (unlikely but safe)
  if (removed < target) {
    for (const pos of skipped) {
      if (removed >= target) break;
      const row = Math.floor(pos / 9);
      const col = pos % 9;
      const saved = puzzle[row][col];
      puzzle[row][col] = 0;
      if (isUniqueSolution(puzzle)) removed++;
      else puzzle[row][col] = saved;
    }
  }

  return { puzzle, solution, givenCount: 81 - removed };
}

// ═══════════════════════════════════════════
// 5. Game state
// ═══════════════════════════════════════════
const state = {
  level: 1,
  puzzle: null,     // 2D array (0 = empty)
  solution: null,   // 2D array (complete)
  current: null,    // 2D array (current state)
  notes: null,      // 2D array of Sets
  given: null,      // 2D array boolean (pre-filled)
  selectedRow: -1,
  selectedCol: -1,
  noteMode: false,
  mistakes: 0,
  hintsUsed: 0,
  timerSeconds: 0,
  timerInterval: null,
  isCompleted: false,
  history: [],      // undo stack
  conflictCells: new Set(),
};

// ═══════════════════════════════════════════
// 6. UI Rendering
// ═══════════════════════════════════════════
const boardEl = document.getElementById('board');
const levelInput = document.getElementById('levelInput');
const diffBadge = document.getElementById('diffBadge');
const timerDisplay = document.getElementById('timerDisplay');
const hintCountEl = document.getElementById('hintCount');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const toastEl = document.getElementById('toast');
const victoryOverlay = document.getElementById('victoryOverlay');

function renderBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;

      // 3x3 region thick borders (overrides the default 1px border via CSS)
      if (c % 3 === 2 && c < 8) cell.classList.add('thick-right');
      if (r % 3 === 2 && r < 8) cell.classList.add('thick-bottom');
      // Remove outer-edge borders (handled by the board's border)
      if (c === 8) cell.classList.add('no-border-right');
      if (r === 8) cell.classList.add('no-border-bottom');

      // Selected
      if (r === state.selectedRow && c === state.selectedCol) {
        cell.classList.add('selected');
      }

      // Same number highlight
      if (state.selectedRow >= 0 && state.current) {
        const val = state.current[state.selectedRow]?.[state.selectedCol];
        if (val && state.current[r][c] === val && !(r === state.selectedRow && c === state.selectedCol)) {
          cell.classList.add('same-num');
        }
      }

      if (state.given && state.given[r][c]) {
        cell.classList.add('given');
      }

      if (state.current) {
        const v = state.current[r][c];
        if (v !== 0) {
          if (!state.given || !state.given[r][c]) {
            cell.classList.add('user');
          }
          cell.textContent = v;
        } else if (state.notes && state.notes[r][c] && state.notes[r][c].size > 0) {
          const notesDiv = document.createElement('div');
          notesDiv.className = 'notes';
          for (let n = 1; n <= 9; n++) {
            const span = document.createElement('span');
            span.textContent = state.notes[r][c].has(n) ? n : '';
            notesDiv.appendChild(span);
          }
          cell.appendChild(notesDiv);
        }
      }

      // Conflict highlight
      if (state.conflictCells && state.conflictCells.has(r * 9 + c)) {
        cell.classList.add('conflict');
      }

      cell.addEventListener('click', () => selectCell(r, c));
      boardEl.appendChild(cell);
    }
  }
  // Reposition picker after re-render if a cell is selected
  if (state.selectedRow >= 0) showPicker(state.selectedRow, state.selectedCol);
}

function updateLevelUI() {
  levelInput.value = state.level;
  const diff = getDifficultyLabel(state.level);
  diffBadge.textContent = `难度: ${diff.label}`;
  diffBadge.className = `difficulty-badge ${diff.class}`;
}

function updateProgress() {
  if (!state.current || !state.given) return;
  let filled = 0;
  let total = 0;
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (!state.given[r][c]) {
        total++;
        if (state.current[r][c] !== 0) filled++;
      }
    }
  }
  const pct = total > 0 ? Math.round((filled / total) * 100) : 0;
  progressFill.style.width = pct + '%';
  progressText.textContent = `${filled}/${total}`;
}

function updateTimer() {
  const m = String(Math.floor(state.timerSeconds / 60)).padStart(2, '0');
  const s = String(state.timerSeconds % 60).padStart(2, '0');
  timerDisplay.textContent = `${m}:${s}`;
}

function updateStats() {
  hintCountEl.textContent = state.hintsUsed;
}

function showToast(msg, type = 'info') {
  toastEl.textContent = msg;
  toastEl.className = `toast ${type} show`;
  clearTimeout(toastEl._timeout);
  toastEl._timeout = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════
// Floating number picker
// ═══════════════════════════════════════════
const pickerEl = document.getElementById('numPicker');

function showPicker(row, col) {
  if (!state.given || state.given[row][col]) { hidePicker(); return; }
  const cell = boardEl.children[row * 9 + col];
  if (!cell) { hidePicker(); return; }
  const rect = cell.getBoundingClientRect();
  const pw = 48 * 3 + 5 * 2 + 16; // approximate picker width (~170px)
  const ph = 48 * 3 + 5 * 2 + 16; // approximate picker height

  let top = rect.bottom + 6;
  let left = rect.left + rect.width / 2 - pw / 2;

  // Reposition if off-screen
  if (top + ph > window.innerHeight) top = rect.top - ph - 6;
  if (left < 6) left = 6;
  if (left + pw > window.innerWidth - 6) left = window.innerWidth - pw - 6;

  pickerEl.style.top = top + 'px';
  pickerEl.style.left = left + 'px';
  pickerEl.classList.add('show');
}

function hidePicker() {
  pickerEl.classList.remove('show');
}

// Picker button clicks
pickerEl.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const num = parseInt(btn.dataset.num);
  if (num >= 1 && num <= 9) {
    setCellValue(num);
    // Keep picker visible for rapid input
  }
});

// Auto-hide picker when clicking outside
document.addEventListener('click', e => {
  if (!pickerEl.classList.contains('show')) return;
  if (pickerEl.contains(e.target)) return;
  if (e.target.closest('.cell')) return;
  hidePicker();
});

// ═══════════════════════════════════════════
// 7. Game logic
// ═══════════════════════════════════════════
function selectCell(row, col) {
  if (state.isCompleted) { hidePicker(); return; }
  state.selectedRow = row;
  state.selectedCol = col;
  renderBoard();
  showPicker(row, col);
}

function setCellValue(num) {
  if (state.isCompleted) return;
  const { selectedRow: r, selectedCol: c } = state;
  if (r < 0 || c < 0) return;
  if (state.given[r][c]) return;

  // Start timer on first action
  startTimerIfNeeded();

  if (state.noteMode) {
    // Toggle note
    if (!state.notes[r][c]) state.notes[r][c] = new Set();
    if (state.notes[r][c].has(num)) {
      state.notes[r][c].delete(num);
    } else {
      state.notes[r][c].add(num);
    }
    // If cell has a value, clear it when adding notes
    if (state.current[r][c] !== 0) {
      saveHistory();
      state.current[r][c] = 0;
    }
    renderBoard();
    updateProgress();
    return;
  }

  if (state.current[r][c] === num) return;

  saveHistory();
  state.current[r][c] = num;
  state.notes[r][c] = new Set(); // clear notes

  // Check if correct
  if (num !== state.solution[r][c]) {
    state.mistakes++;
    state.conflictCells.add(r * 9 + c);
    renderBoard();
    updateProgress();
    setTimeout(() => {
      state.current[r][c] = 0;
      state.conflictCells.delete(r * 9 + c);
      renderBoard();
      updateProgress();
    }, 400);
    showToast('数字有误，再试一次', 'error');
    return;
  }

  // Correct entry
  state.conflictCells.delete(r * 9 + c);
  renderBoard();
  updateProgress();
  checkVictory();
}

function eraseCell() {
  if (state.isCompleted) return;
  const { selectedRow: r, selectedCol: c } = state;
  if (r < 0 || c < 0) return;
  if (state.given[r][c]) return;
  if (state.current[r][c] === 0 && (!state.notes[r][c] || state.notes[r][c].size === 0)) return;

  saveHistory();
  state.current[r][c] = 0;
  state.notes[r][c] = new Set();
  state.conflictCells.delete(r * 9 + c);
  renderBoard();
  updateProgress();
}

function useHint() {
  if (state.isCompleted) return;

  // Find best cell to hint: prefer empty cells in most constrained positions
  let bestR = -1, bestC = -1, minCands = 10;
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (state.given[r][c]) continue;
      if (state.current[r][c] !== 0) continue;
      const cands = getCandidates(state.current, r, c);
      if (cands.length < minCands) {
        minCands = cands.length;
        bestR = r; bestC = c;
      }
    }
  }

  if (bestR === -1) {
    showToast('没有可提示的空格', 'info');
    return;
  }

  startTimerIfNeeded();
  saveHistory();
  state.current[bestR][bestC] = state.solution[bestR][bestC];
  state.notes[bestR][bestC] = new Set();
  state.hintsUsed++;

  state.selectedRow = bestR;
  state.selectedCol = bestC;

  renderBoard();
  updateProgress();
  updateStats();

  // Flash animation
  const idx = bestR * 9 + bestC;
  const cellEl = boardEl.children[idx];
  if (cellEl) cellEl.classList.add('hint');

  showToast('已填入提示数字', 'info');
  checkVictory();
}

function checkBoard() {
  if (state.isCompleted) return;

  const errors = new Set();
  let correct = 0;
  let empty = 0;

  // Check each cell
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (state.given[r][c]) { correct++; continue; }
      const v = state.current[r][c];
      if (v === 0) { empty++; continue; }
      if (v !== state.solution[r][c]) {
        errors.add(r * 9 + c);
      } else {
        correct++;
      }
    }
  }

  if (errors.size > 0) {
    state.conflictCells = errors;
    renderBoard();
    showToast(`发现 ${errors.size} 个错误`, 'error');
    setTimeout(() => {
      state.conflictCells = new Set();
      renderBoard();
    }, 1500);
  } else if (empty === 0) {
    showToast('全部正确！', 'success');
    checkVictory();
  } else {
    state.conflictCells = new Set();
    renderBoard();
    showToast(`已完成 ${correct}/81，还差 ${empty} 格`, 'success');
  }
}

function checkVictory() {
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (state.current[r][c] !== state.solution[r][c]) return;
    }
  }
  // Victory!
  state.isCompleted = true;
  stopTimer();
  hidePicker();

  const diff = getDifficultyLabel(state.level);
  const m = String(Math.floor(state.timerSeconds / 60)).padStart(2, '0');
  const s = String(state.timerSeconds % 60).padStart(2, '0');

  document.getElementById('victoryLevel').textContent = `第 ${state.level} 关`;
  document.getElementById('victoryDifficulty').textContent = `难度: ${diff.label}`;
  document.getElementById('victoryTime').textContent = `${m}:${s}`;
  document.getElementById('victoryHints').textContent = state.hintsUsed;
  document.getElementById('victoryErrors').textContent = state.mistakes;

  victoryOverlay.classList.add('show');

  // Save progress
  saveToStorage();
}

function saveHistory() {
  state.history.push({
    current: state.current.map(r => [...r]),
    notes: state.notes.map(r => r.map(s => new Set(s))),
  });
  // Limit history
  if (state.history.length > 50) state.history.shift();
}

function undo() {
  if (state.isCompleted) return;
  if (state.history.length === 0) {
    showToast('没有可撤销的操作', 'info');
    return;
  }
  const snap = state.history.pop();
  state.current = snap.current;
  state.notes = snap.notes;
  renderBoard();
  updateProgress();
  showToast('已撤销', 'info');
}

// ═══════════════════════════════════════════
// 8. Timer
// ═══════════════════════════════════════════
let timerStarted = false;

function startTimerIfNeeded() {
  if (timerStarted) return;
  timerStarted = true;
  state.timerInterval = setInterval(() => {
    state.timerSeconds++;
    updateTimer();
  }, 1000);
}

function stopTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
}

function resetTimer() {
  stopTimer();
  timerStarted = false;
  state.timerSeconds = 0;
  updateTimer();
}

// ═══════════════════════════════════════════
// 9. Load level
// ═══════════════════════════════════════════
function loadLevel(level) {
  level = Math.max(1, Math.min(1000, level));
  state.level = level;
  state.selectedRow = -1;
  state.selectedCol = -1;
  state.mistakes = 0;
  state.hintsUsed = 0;
  state.isCompleted = false;
  state.history = [];
  state.conflictCells = new Set();

  resetTimer();
  updateStats();
  hidePicker();

  const result = generatePuzzle(level);
  state.puzzle = result.puzzle;
  state.solution = result.solution;
  state.current = copyGrid(result.puzzle);
  state.notes = Array.from({ length: 9 }, () =>
    Array.from({ length: 9 }, () => new Set())
  );
  state.given = result.puzzle.map(row => row.map(v => v !== 0));

  updateLevelUI();
  renderBoard();
  updateProgress();

  // Auto-select first empty cell so user can type immediately
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (!state.given[r][c]) {
        state.selectedRow = r;
        state.selectedCol = c;
        break;
      }
    }
    if (state.selectedRow >= 0) break;
  }
  // Re-render with selection, then show picker
  renderBoard();
  if (state.selectedRow >= 0) showPicker(state.selectedRow, state.selectedCol);

  // Blur the level input so keyboard events go to the game
  if (document.activeElement && document.activeElement.tagName === 'INPUT') {
    document.activeElement.blur();
  }

  victoryOverlay.classList.remove('show');
}

// ═══════════════════════════════════════════
// 10. Storage
// ═══════════════════════════════════════════
const STORAGE_KEY = 'sudoku1000_progress';

function saveToStorage() {
  try {
    const data = {
      level: state.level,
      current: state.current,
      notes: state.notes.map(r => r.map(s => Array.from(s))),
      timer: state.timerSeconds,
      hintsUsed: state.hintsUsed,
      mistakes: state.mistakes,
      completed: state.isCompleted,
      timerStarted,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { /* ignore */ }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data || typeof data.level !== 'number') return false;

    state.level = data.level;
    state.timerSeconds = data.timer || 0;
    state.hintsUsed = data.hintsUsed || 0;
    state.mistakes = data.mistakes || 0;
    state.isCompleted = data.completed || false;

    const result = generatePuzzle(state.level);
    state.puzzle = result.puzzle;
    state.solution = result.solution;
    state.given = result.puzzle.map(row => row.map(v => v !== 0));

    state.notes = Array.from({ length: 9 }, () =>
      Array.from({ length: 9 }, () => new Set())
    );

    if (data.notes) {
      for (let r = 0; r < 9 && r < data.notes.length; r++) {
        for (let c = 0; c < 9 && c < data.notes[r].length; c++) {
          if (Array.isArray(data.notes[r][c])) {
            state.notes[r][c] = new Set(data.notes[r][c]);
          }
        }
      }
    }

    // Restore current state but respect givens
    state.current = copyGrid(result.puzzle);
    if (data.current) {
      for (let r = 0; r < 9 && r < data.current.length; r++) {
        for (let c = 0; c < 9 && c < data.current[r].length; c++) {
          if (!state.given[r][c] && data.current[r][c] !== 0) {
            state.current[r][c] = data.current[r][c];
          }
        }
      }
    }

    if (data.timerStarted) {
      timerStarted = true;
      state.timerInterval = setInterval(() => {
        state.timerSeconds++;
        updateTimer();
      }, 1000);
    }

    updateTimer();
    updateStats();
    updateLevelUI();
    renderBoard();
    updateProgress();

    if (data.completed) {
      victoryOverlay.classList.add('show');
    }

    return true;
  } catch (e) {
    return false;
  }
}

// ═══════════════════════════════════════════
// 11. Auto-save (every 10 seconds)
// ═══════════════════════════════════════════
setInterval(() => {
  if (state.current && timerStarted) saveToStorage();
}, 10000);

// ═══════════════════════════════════════════
// 12. Event Handlers
// ═══════════════════════════════════════════
// Numpad
document.getElementById('numpad').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const num = parseInt(btn.dataset.num);
  if (num >= 1 && num <= 9) setCellValue(num);
});

// Action buttons
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('eraseBtn').addEventListener('click', eraseCell);
document.getElementById('noteBtn').addEventListener('click', () => {
  state.noteMode = !state.noteMode;
  document.getElementById('noteBtn').classList.toggle('active', state.noteMode);
  showToast(state.noteMode ? '笔记模式 已开启' : '笔记模式 已关闭', 'info');
});
document.getElementById('hintBtn').addEventListener('click', useHint);
document.getElementById('checkBtn').addEventListener('click', checkBoard);

// Level navigation
document.getElementById('prevLevelBtn').addEventListener('click', () => {
  if (state.level > 1) loadLevel(state.level - 1);
  else showToast('已经是第一关', 'info');
});
document.getElementById('nextLevelBtn').addEventListener('click', () => {
  if (state.level < 1000) loadLevel(state.level + 1);
  else showToast('已经是最后一关', 'info');
});

levelInput.addEventListener('change', () => {
  let v = parseInt(levelInput.value);
  if (isNaN(v)) v = 1;
  loadLevel(v);
});

// Victory overlay
document.getElementById('victoryNextBtn').addEventListener('click', () => {
  if (state.level < 1000) loadLevel(state.level + 1);
  else showToast('恭喜通关全部 1000 关！', 'success');
});
document.getElementById('victoryRetryBtn').addEventListener('click', () => {
  loadLevel(state.level);
});

// Keyboard
document.addEventListener('keydown', e => {
  // Don't interfere with input fields (e.g. level selector)
  if (e.target.tagName === 'INPUT') return;
  if (e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    setCellValue(parseInt(e.key));
    return;
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    e.preventDefault();
    eraseCell();
    return;
  }
  if (e.key === 'n' || e.key === 'N') {
    state.noteMode = !state.noteMode;
    document.getElementById('noteBtn').classList.toggle('active', state.noteMode);
    return;
  }
  if (e.key === 'ArrowUp' && state.selectedRow > 0) {
    e.preventDefault();
    selectCell(state.selectedRow - 1, state.selectedCol);
    return;
  }
  if (e.key === 'ArrowDown' && state.selectedRow < 8) {
    e.preventDefault();
    selectCell(state.selectedRow + 1, state.selectedCol);
    return;
  }
  if (e.key === 'ArrowLeft' && state.selectedCol > 0) {
    e.preventDefault();
    selectCell(state.selectedRow, state.selectedCol - 1);
    return;
  }
  if (e.key === 'ArrowRight' && state.selectedCol < 8) {
    e.preventDefault();
    selectCell(state.selectedRow, state.selectedCol + 1);
    return;
  }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    undo();
    return;
  }
});

// ═══════════════════════════════════════════
// 13. Init
// ═══════════════════════════════════════════
if (!loadFromStorage()) {
  loadLevel(1);
}

// Save on page unload
window.addEventListener('beforeunload', saveToStorage);
</script>
</body>
